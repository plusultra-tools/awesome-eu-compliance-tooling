name: Link Check

on:
  schedule:
    # Monday 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    name: Check links in README.md
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2.1.0
        with:
          # Verbose, fail on broken links, only check README.md
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --timeout 20
            --retry-wait-time 2
            --max-retries 2
            --exclude-mail
            --accept 200,206,301,302,308,403,429
            ./README.md
          output: ./lychee-report.md
          fail: false

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          if-no-files-found: ignore

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected in README.md (weekly scan)"
          content-filepath: ./lychee-report.md
          labels: |
            broken-links
            automated
            maintenance

      - name: Fail job if links are broken
        if: steps.lychee.outputs.exit_code != '0'
        run: |
          echo "::error::lychee reported broken links. See uploaded artifact and the auto-opened issue."
          exit 1
